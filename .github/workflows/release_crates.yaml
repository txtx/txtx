name: Publish Rust Crates

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      supervisor_ui_tag:
        description: Supervisor UI release tag to package, for example v0.1.2. Leave empty to use the latest release.
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: txtx
          fetch-depth: 0

      - name: Download Supervisor UI release
        shell: bash
        env:
          SUPERVISOR_UI_TAG_INPUT: ${{ github.event.inputs.supervisor_ui_tag }}
        run: |
          SUPERVISOR_UI_TAG_INPUT="$(echo "${SUPERVISOR_UI_TAG_INPUT:-}" | xargs)"

          if [[ -n "${SUPERVISOR_UI_TAG_INPUT}" ]]; then
            if [[ "${SUPERVISOR_UI_TAG_INPUT}" == v* ]]; then
              SUPERVISOR_UI_TAG="${SUPERVISOR_UI_TAG_INPUT}"
            else
              SUPERVISOR_UI_TAG="v${SUPERVISOR_UI_TAG_INPUT}"
            fi
          else
            SUPERVISOR_UI_TAG="$(curl -fsSLI -o /dev/null -w '%{url_effective}' https://github.com/solana-foundation/txtx-supervisor-ui/releases/latest | sed -E 's#.*/tag/([^/?]+)$#\1#')"
          fi
          echo "Using supervisor UI release ${SUPERVISOR_UI_TAG}"

          rm -rf txtx/crates/txtx-supervisor-ui/supervisor-dist
          mkdir -p txtx/crates/txtx-supervisor-ui/supervisor-dist

          curl -fsSL \
            --retry 3 \
            --output txtx-supervisor-ui-dist.tar.gz \
            "https://github.com/solana-foundation/txtx-supervisor-ui/releases/download/${SUPERVISOR_UI_TAG}/txtx-supervisor-ui-dist.tar.gz"

          tar -xzf txtx-supervisor-ui-dist.tar.gz -C txtx/crates/txtx-supervisor-ui/supervisor-dist
          rm -f txtx-supervisor-ui-dist.tar.gz

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
          
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Cache Cargo registry and index
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Detect unpublished publishable crates
        id: detect
        run: |
          cd txtx
          mapfile -t publishable_crates < <(
            cargo metadata --format-version=1 --no-deps \
              | jq -r '
                  .workspace_root as $root
                  | .packages[]
                  | select(.manifest_path | startswith($root))
                  | select((.publish // null) != [])
                  | "\(.name):\(.version):\(.manifest_path | ltrimstr($root + "/"))"
                '
          )

          unpublished_packages=()

          for entry in "${publishable_crates[@]}"; do
            package_name="${entry%%:*}"
            remainder="${entry#*:}"
            current_version="${remainder%%:*}"

            http_code="$(curl -sS -o /dev/null -w '%{http_code}' \
              -H 'User-Agent: txtx-release-ci' \
              -H 'Accept: application/json' \
              "https://crates.io/api/v1/crates/${package_name}/${current_version}")"

            if [[ "${http_code}" == "404" ]]; then
              unpublished_packages+=("$package_name")
            elif [[ "${http_code}" != "200" ]]; then
              echo "::error::Unexpected crates.io response for ${package_name}@${current_version}: HTTP ${http_code}"
              exit 1
            fi
          done

          exclude_args=()
          for entry in "${publishable_crates[@]}"; do
            package_name="${entry%%:*}"
            if [[ ! " ${unpublished_packages[*]} " =~ " ${package_name} " ]]; then
              exclude_args+=(--exclude "$package_name")
            fi
          done

          {
            echo "publish_count=${#unpublished_packages[@]}"
            if [ "${#unpublished_packages[@]}" -gt 0 ]; then
              echo "has_unpublished=true"
              echo "publish_packages=${unpublished_packages[*]}"
              echo "exclude_args=${exclude_args[*]}"
            else
              echo "has_unpublished=false"
              echo "publish_packages="
              echo "exclude_args="
            fi
          } >> "$GITHUB_OUTPUT"

      - name: Authenticate with crates.io
        if: steps.detect.outputs.has_unpublished == 'true'
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish Crates
        if: steps.detect.outputs.has_unpublished == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          cd txtx
          echo "Publishing crates: ${{ steps.detect.outputs.publish_packages }}"
          cargo publish --workspace --allow-dirty --locked ${{ steps.detect.outputs.exclude_args }}
